name: Deploy Jekyll site to Pages

on:
  # Berjalan otomatis setiap ada push ke branch "main"
  push:
    branches: ["main"]

  # Memungkinkan Anda menjalankan workflow ini secara manual dari tab Actions
  workflow_dispatch:

# Mengatur izin (permissions) agar GitHub token bisa men-deploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Memastikan hanya ada satu proses deploy yang berjalan dalam satu waktu
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Tahap 1: Membangun situs (Build)
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositori
        uses: actions/checkout@v4
        
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5
        
      - name: Build dengan Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Tahap 2: Memublikasikan situs (Deploy)
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 # Action yang sebelumnya mengalami kegagalan di log Anda
