<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
        MathJax = { 
            tex: { 
                inlineMath: [['$', '$']],
                macros: {
                    set: ["\\left\\{ #1 \\right\\}", 1]
                } 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            line-height: 1.65;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            text-align: justify;
        }
        
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        details { margin-top: 10px; }
        summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
        
        /* Matikan penomoran standar bawaan Markdown */
        ol, ul {
            list-style-type: none !important;
            padding-left: 2em; /* Jarak indentasi ke dalam untuk sub-soal */
            margin-top: 10px;
            margin-bottom: 10px;
        }

        /* --- KUNCI RAHASIA: GRID KHUSUS LATEX --- */
        .latex-grid {
            display: grid;
            grid-template-columns: 2.5em 1fr; /* 2.5em adalah lebar kolom nomor */
            gap: 12px;
            align-items: start;
            margin-bottom: 15px; /* Jarak antar soal */
        }
        
        .latex-marker {
            text-align: right; /* Kurung tutup akan selalu sejajar rapi di kanan */
            white-space: nowrap;
        }
        
        .latex-content {
            text-align: justify; /* Teks mengotak sempurna layaknya LaTeX */
        }

        @media screen and (max-width: 768px) {
            h1 { font-size: 1.5rem !important; line-height: 1.4 !important; }
            body { padding-left: 15px; padding-right: 15px; }
            .MathJax_Display, .katex-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 10px; }
            .latex-grid { grid-template-columns: 2.2em 1fr; gap: 8px; } /* Sesuaikan di HP */
        }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>

<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>
    <main>
        {{ content }}
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Ambil SEMUA elemen <p> dan <li> di dalam main.
            // Gunakan reverse() agar elemen bersarang (nested) diproses dari dalam ke luar
            // (mencegah bug HTML hilang saat struktur diubah).
            let elements = Array.from(document.querySelectorAll("main p, main li")).reverse();
            
            elements.forEach(function(el) {
                let html = el.innerHTML;
                
                // Regex pencari: Deteksi teks yang berawalan (1), (a), (iii)
                // Walaupun di-generate Markdown dengan spasi atau &nbsp;
                let match = html.match(/^(?:&nbsp;|\s)*(\([a-zA-Z0-9]{1,5}\))(?:&nbsp;|\s)*/);
                
                // Jika ketemu dan belum diproses menjadi grid
                if (match && !html.includes('latex-grid')) {
                    let marker = match[1]; // Mengambil nomornya (misal: "(iii)")
                    let content = html.substring(match[0].length); // Mengambil sisa teksnya
                    
                    // Rombak paksa elemen tersebut menjadi susunan Grid
                    el.innerHTML = `
                        <div class="latex-grid">
                            <div class="latex-marker">${marker}</div>
                            <div class="latex-content">${content}</div>
                        </div>
                    `;
                    
                    // Bersihkan margin bawaan agar tidak ada jarak bolong yang aneh
                    el.style.margin = "0";
                    el.style.padding = "0";
                }
            });
        });
    </script>
</body>
</html>
