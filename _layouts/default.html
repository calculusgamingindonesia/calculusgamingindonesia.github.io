<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    <script>
      MathJax = {
        tex: {
          inlineMath: [['$', '$']],
          macros: {
            set: ["\\left\\{ #1 \\right\\}", 1]
          }
        }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-svg.js"></script>
    <style>
      body {
        font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
        font-size: 16px;
        color: #000;
        font-weight: 400;
        line-height: 1.6;
        margin: 40px auto;
        max-width: 800px;
        padding: 0 24px;
        text-align: justify;
      }
      a { color: #0366d6; text-decoration: none; }
      a:hover { text-decoration: underline; }
      details { margin-top: 8px; }
      summary { cursor: pointer; color: #0366d6; font-weight: 700; user-select: none; margin-bottom: 8px; }
      .kotak-solusi { background: #f9f9f9; padding: 16px; border-left: 4px solid #28a745; border-radius: 8px; }
      ol {
        list-style-type: none;
        counter-reset: soal-counter;
        padding-left: 2.5em;
      }
      ol > li {
        counter-increment: soal-counter;
        position: relative;
        margin-bottom: 32px;
      }
      ol > li::before {
        content: "(" counter(soal-counter) ")";
        position: absolute;
        left: -2.5em;
        width: 1.5em;
        text-align: right;
      }
      ol ul {
        list-style-type: none;
        padding-left: 0;
        margin-top: 16px;
      }
      ol ol {
        list-style-type: lower-alpha;
        padding-left: 2.5em;
        counter-reset: none;
        margin-top: 8px;
      }
      ol ul > li, ol ol > li {
        position: relative !important;
        display: block !important;
        margin-bottom: 8px;
        line-height: 1.6;
        text-align: justify !important;
        padding-left: 2.5em !important;
        text-indent: 0 !important;
      }
      .custom-sub-marker {
        position: absolute !important;
        left: 0 !important;
        top: 0 !important;
        width: 1.5em !important;
        text-align: right !important;
        font-weight: 500;
      }
      ol ul > li > .custom-sub-marker, ol ol > li > .custom-sub-marker {
        left: 0 !important;
      }
      ol ol > li::before {
        content: none !important;
      }
      .custom-sub-content {
        display: inline !important;
        text-align: justify !important;
      }
      ol ul > li p, ol ol > li p {
        display: inline !important;
        margin: 0 !important;
        padding: 0 !important;
        text-align: justify !important;
      }
      @media screen and (max-width: 768px) {
        h1 { font-size: 1.5rem !important; line-height: 1.5 !important; }
        body { padding: 0 16px; }
        ol { padding-left: 2em; }
        ol > li::before { left: -2em; }
        .MathJax_Display, .katex-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 8px; }
      }
    </style>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        function rapikanPoin() {
          document.querySelectorAll("ol ul > li, ol ol > li").forEach(function(li) {
            if (li.querySelector(".custom-sub-marker")) return;
            let target = li.querySelector("p") || li;
            let textMentah = target.innerHTML.trim();
            let match = textMentah.match(/^(\s*\([a-zA-Z0-9_iI\s\u00a0.-]+\))\s*/);
            if (match) {
              let marker = match[1].trim();
              let content = textMentah.substring(match[0].length);
              target.innerHTML = '<span class="custom-sub-marker">' + marker + '</span><span class="custom-sub-content">' + content + '</span>';
            }
          });
        }
        rapikanPoin();
        setTimeout(rapikanPoin, 100);
      });
    </script>
  </head>
  <body>
    <header>
      <h2><a href="/">Calculus Gaming Indonesia</a></h2>
      <hr>
    </header>
    <main>
      {{ content }}
    </main>
  </body>
</html>
