<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
      MathJax = { tex: { inlineMath: [['$', '$']],
    macros: {
      set: ["\\left\\{ #1 \\right\\}", 1]
    } } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
    body { 
        font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
        font-size: 17px;
        color: #000000;
        font-weight: 1000;
        line-height: 1.65;
        margin: 40px auto; 
        max-width: 800px; 
        padding: 0 20px; 
        text-align: justify;
    }

    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    details { margin-top: 10px; }
    summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
    .kotak-solusi { background: #f9f9f9; padding: 15px; border-left: 4px solid #28a745; border-radius: 4px; }

    ol {
      list-style-type: none;   
      counter-reset: soal-counter;
      padding-left: 2em;    
    }

    ol > li {
      counter-increment: soal-counter;
      position: relative;
      margin-bottom: 30px;     
    }

    ol > li::before {
      content: "(" counter(soal-counter) ")";
      position: absolute;
      left: -2em;               
      width: 1.5em;
      text-align: right;
      font-weight: bold;
    }

    ol ul {
      list-style-type: none;   
      padding-left: 0;
      margin-top: 15px;
    }
    
    ol ul > li {
      padding-left: 2em;  
      text-indent: -2em; 
      margin-bottom: 12px;
      line-height: 1.7;
    }
    
    ol ul > li::before {
      content: none; 
    }

    ol ol {
      list-style-type: lower-alpha;
      padding-left: 2em;
      counter-reset: none;
      margin-top: 10px;
    }
    ol ol > li {
      margin-bottom: 12px;
      text-indent: 0;
    }
    ol ol > li::before {
      content: none;
    }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>
<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>

    <main>
        {{ content }}
    </main>
</body>
</html>
