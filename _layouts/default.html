<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
        MathJax = { 
            tex: { 
                inlineMath: [['$', '$']],
                macros: {
                    set: ["\\left\\{ #1 \\right\\}", 1]
                } 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            line-height: 1.65;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            text-align: justify;
        }
        
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        details { margin-top: 10px; }
        summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
        .kotak-solusi { background: #f9f9f9; padding: 15px; border-left: 4px solid #28a745; border-radius: 4px; }
        
        /* List Utama (Nomor Soal) */
        ol {
            list-style-type: none;
            counter-reset: soal-counter;
            padding-left: 2em;
        }
        ol > li {
            counter-increment: soal-counter;
            position: relative;
            margin-bottom: 30px;
        }
        ol > li::before {
            content: "(" counter(soal-counter) ")";
            position: absolute;
            left: -2em;
            width: 1.5em;
            text-align: right;
        }
        
        /* BARU: Reset total semua padding/margin bawaan browser pada list bersarang.
           Ini memastikan (a), (b) maupun (i), (ii), (iii) tidak terdorong semakin ke kanan.
        */
        ol ol, ol ul, ul ol, ul ul {
            padding-left: 0 !important;
            margin-left: 0 !important;
            list-style-type: none !important;
            margin-top: 10px;
        }

        /* KELAS UTAMA: Menyeragamkan posisi semua jenis sub-poin agar menggantung & sejajar */
        .custom-hanging-container {
            position: relative !important;
            padding-left: 2.3em !important; /* Jarak teks dari tepi kiri */
            text-indent: 0 !important;
            margin-bottom: 12px;
            line-height: 1.7;
            text-align: justify;
            display: block;
        }

        /* Posisi absolut penanda/buka-tutup kurung seperti (b) atau (iii) */
        .custom-sub-marker {
            position: absolute !important;
            left: 0 !important;
            width: 1.9em !important; /* Lebar ruang marker agar teks (iii) tidak tabrakan */
            text-align: right !important;
            font-weight: inherit;
        }

        .custom-sub-content {
            display: block !important;
            text-align: justify !important;
        }

        @media screen and (max-width: 768px) {
            h1 {
                font-size: 1.5rem !important;
                line-height: 1.4 !important;
            }
            body {
                padding-left: 15px;
                padding-right: 15px;
            }
            ol {
                padding-left: 1.75em;
            }
            ol > li::before {
                left: -2.25em;
            }
            .custom-hanging-container {
                padding-left: 2.5em !important;
            }
            .custom-sub-marker {
                width: 2.1em !important;
            }
            .MathJax_Display, .katex-display {
                overflow-x: auto;
                overflow-y: hidden;
                padding-bottom: 10px;
            }
        }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // STRATEGI BARU: Ambil semua elemen paragraf (<p>) dan list (<li>) di dalam main
        let elements = document.querySelectorAll("main p, main li");
        
        elements.forEach(function(el) {
            // Hindari pemrosesan ganda jika elemen sudah diubah
            if (el.querySelector('.custom-sub-marker')) return;
            
            let html = el.innerHTML.trim();
            // Regex mendeteksi teks yang diawali oleh tanda kurung seperti (a), (b), (i), (iii)
            let match = html.match(/^(\s*\([a-zA-Z0-9_iI\s\u00a0.-]+\))\s*/);
            
            if (match) {
                let marker = match[1].trim();
                let content = html.substring(match[0].length);
                
                // Paksa elemen menggunakan layout menggantung yang seragam
                el.classList.add('custom-hanging-container');
                el.innerHTML = '<span class="custom-sub-marker">' + marker + '</span><span class="custom-sub-content">' + content + '</span>';
            }
        });
    });
</script>

<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>
    <main>
        {{ content }}
    </main>
</body>
</html>
