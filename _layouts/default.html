<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
        MathJax = { 
            tex: { 
                inlineMath: [['$', '$']],
                macros: {
                    set: ["\\left\\{ #1 \\right\\}", 1]
                } 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            line-height: 1.65;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            text-align: justify;
        }
        
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        details { margin-top: 10px; }
        summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
        
        /* --- PURE CSS UNTUK LIST ALA LATEX (TANPA JAVASCRIPT) --- */
        
        /* Level 1: (1), (2), (3) */
        ol {
            list-style: none;
            counter-reset: level-one;
            padding-left: 2.5em; /* Jarak indentasi ke dalam */
        }
        
        ol > li {
            counter-increment: level-one;
            position: relative;
            margin-bottom: 15px;
        }
        
        /* Menggunakan position absolute + right 100% untuk mengunci teks dan meratakan nomor */
        ol > li::before {
            content: "(" counter(level-one) ")";
            position: absolute;
            right: 100%;
            margin-right: 0.8em; /* Spasi antara penomoran dan teks */
            width: 3em;
            text-align: right; /* Membuat kurung tutup selalu sejajar */
        }
        
        /* Level 2: (a), (b), (c) */
        ol ol {
            counter-reset: level-two;
            margin-top: 10px;
        }
        ol ol > li {
            counter-increment: level-two;
        }
        ol ol > li::before {
            content: "(" counter(level-two, lower-alpha) ")";
        }
        
        /* Level 3: (i), (ii), (iii) */
        ol ol ol {
            counter-reset: level-three;
        }
        ol ol ol > li {
            counter-increment: level-three;
        }
        ol ol ol > li::before {
            content: "(" counter(level-three, lower-roman) ")";
        }

        /* Penyesuaian untuk layar HP */
        @media screen and (max-width: 768px) {
            h1 { font-size: 1.5rem !important; line-height: 1.4 !important; }
            body { padding-left: 15px; padding-right: 15px; }
            ol { padding-left: 2em; }
            ol > li::before { width: 2em; margin-right: 0.5em; }
            .MathJax_Display, .katex-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 10px; }
        }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>

<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>
    <main>
        {{ content }}
    </main>
</body>
</html>
