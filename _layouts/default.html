<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
        MathJax = { 
            tex: { 
                inlineMath: [['$', '$']],
                macros: {
                    set: ["\\left\\{ #1 \\right\\}", 1]
                } 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            line-height: 1.65;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            text-align: justify;
        }
        
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        details { margin-top: 10px; }
        summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
        
        /* List Utama (1), (2), (3) */
        ol {
            list-style-type: none;
            counter-reset: soal-counter;
            padding-left: 2em;
        }
        ol > li {
            counter-increment: soal-counter;
            position: relative;
            margin-bottom: 30px;
        }
        ol > li::before {
            content: "(" counter(soal-counter) ")";
            position: absolute;
            left: -2em;
            width: 1.5em;
            text-align: right;
        }
        
        /* Reset jarak list bersarang */
        ol ul, ol ol {
            list-style-type: none;
            padding-left: 0;
            margin-top: 15px;
        }
        ol ul > li, ol ol > li {
            padding-left: 0 !important; 
            margin-bottom: 12px;
            line-height: 1.7;
        }
        ol ul > li::before, ol ol > li::before {
            content: none;
        }

        /* --- CSS GRID: SOLUSI PASTI SEJAJAR SEPERTI LATEX --- */
        .grid-list-item {
            display: grid;
            /* Kolom 1 (Nomor): Lebar tetap 40px. Kolom 2 (Teks): Mengisi sisa ruang */
            grid-template-columns: 40px 1fr; 
            gap: 12px; /* Jarak spasi antara penomoran dan huruf awal teks */
            align-items: start;
        }
        .grid-marker {
            text-align: right; /* Memastikan (i) dan (iii) sejajar di kurung tutupnya */
            white-space: nowrap;
        }
        .grid-content {
            text-align: justify;
        }

        @media screen and (max-width: 768px) {
            h1 { font-size: 1.5rem !important; line-height: 1.4 !important; }
            body { padding-left: 15px; padding-right: 15px; }
            .MathJax_Display, .katex-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 10px; }
            .grid-list-item { grid-template-columns: 35px 1fr; gap: 8px; } /* Dikecilkan sedikit untuk HP */
        }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>

<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>
    <main>
        {{ content }}
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll("ol ul > li, ol ol > li").forEach(function(li) {
                let target = li.querySelector("p") || li;
                let match = target.innerHTML.match(/^(\s*\([a-zA-Z0-9_iI\s\u00a0.-]+\))\s*/);
                
                if (match) {
                    let marker = match[1].trim();
                    let content = target.innerHTML.substring(match[0].length);
                    
                    // Membungkus nomor dan teks ke dalam format Grid
                    target.innerHTML = `
                        <div class="grid-list-item">
                            <div class="grid-marker">${marker}</div>
                            <div class="grid-content">${content}</div>
                        </div>
                    `;
                    // Menghilangkan margin bawaan tag <p> agar elemen tidak merenggang aneh di atas
                    if(target.tagName.toLowerCase() === 'p') {
                        target.style.margin = "0";
                    }
                }
            });
        });
    </script>
</body>
</html>
