<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
        MathJax = { 
            tex: { 
                inlineMath: [['$', '$']],
                macros: {
                    set: ["\\left\\{ #1 \\right\\}", 1]
                } 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            line-height: 1.65;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            text-align: justify;
        }
        
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        details { margin-top: 10px; }
        summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
        
        /* List Utama (1), (2), (3) */
        ol {
            list-style-type: none;
            counter-reset: soal-counter;
            padding-left: 2em;
        }
        ol > li {
            counter-increment: soal-counter;
            position: relative;
            margin-bottom: 30px;
        }
        ol > li::before {
            content: "(" counter(soal-counter) ")";
            position: absolute;
            left: -2em;
            width: 1.5em;
            text-align: right;
        }
        
        /* Reset jarak list bersarang (a), (b) & (i), (ii) */
        ol ul, ol ol {
            list-style-type: none;
            padding-left: 0;
            margin-top: 15px;
        }
        ol ul > li, ol ol > li {
            padding-left: 0 !important; 
            margin-bottom: 12px;
            line-height: 1.7;
        }
        ol ul > li::before, ol ol > li::before {
            content: none;
        }

        /* --- FLEXBOX: INI YANG BIKIN TEKS SEJAJAR SEMPURNA --- */
        .flex-list-item {
            display: flex;
            align-items: flex-start;
        }
        .flex-marker {
            flex-shrink: 0;
            /* Ubah angka 3em di bawah ini jika ingin menggeser nomor lebih ke kiri atau kanan */
            width: 3em; 
            text-align: center; /* Membuat (i), (ii) persis di tengah area lebarnya */
            margin-right: 0.5em; /* Jarak spasi antara nomor dan awal teks */
        }
        .flex-content {
            flex-grow: 1;
            text-align: justify;
        }

        @media screen and (max-width: 768px) {
            h1 { font-size: 1.5rem !important; line-height: 1.4 !important; }
            body { padding-left: 15px; padding-right: 15px; }
            /* Penyesuaian di layar HP */
            .flex-marker { width: 2.2em; }
            .MathJax_Display, .katex-display { overflow-x: auto; overflow-y: hidden; padding-bottom: 10px; }
        }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>

<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>
    <main>
        {{ content }}
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            document.querySelectorAll("ol ul > li, ol ol > li").forEach(function(li) {
                // Cari elemen <p> dari markdown, atau gunakan <li> langsung
                let target = li.querySelector("p") || li;
                
                // Deteksi teks yang diawali kurung seperti (a), (i), (ii)
                let match = target.innerHTML.match(/^(\s*\([a-zA-Z0-9_iI\s\u00a0.-]+\))\s*/);
                
                if (match) {
                    let marker = match[1].trim();
                    let content = target.innerHTML.substring(match[0].length);
                    
                    // Ganti struktur HTML menjadi Flexbox
                    target.innerHTML = `
                        <span class="flex-marker">${marker}</span>
                        <span class="flex-content">${content}</span>
                    `;
                    target.classList.add('flex-list-item');
                }
            });
        });
    </script>
</body>
</html>
