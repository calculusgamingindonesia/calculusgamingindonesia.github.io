<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | Calculus Gaming Indonesia</title>
    
    <script>
        MathJax = { 
            tex: { 
                inlineMath: [['$', '$']],
                macros: {
                    set: ["\\left\\{ #1 \\right\\}", 1]
                } 
            } 
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body {
            font-family: "Computer Modern Serif", Georgia, "Times New Roman", serif;
            font-size: 17px;
            color: #000000;
            font-weight: 500;
            line-height: 1.65;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            text-align: justify;
        }
        
        a { color: #0366d6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        details { margin-top: 10px; }
        summary { cursor: pointer; color: #0366d6; font-weight: bold; user-select: none; margin-bottom: 10px; }
        .kotak-solusi { background: #f9f9f9; padding: 15px; border-left: 4px solid #28a745; border-radius: 4px; }
        
        ol {
            list-style-type: none;
            counter-reset: soal-counter;
            padding-left: 2em;
        }
        ol > li {
            counter-increment: soal-counter;
            position: relative;
            margin-bottom: 30px;
        }
        ol > li::before {
            content: "(" counter(soal-counter) ")";
            position: absolute;
            left: -2em;
            width: 1.5em;
            text-align: right;
        }
        
        ol ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 15px;
        }
        ol ol {
            list-style-type: lower-alpha;
            padding-left: 2em;
            counter-reset: none;
            margin-top: 10px;
        }

        /* Set LI sub-item menggunakan struktur Flexbox */
        ol ul > li, ol ol > li {
            display: flex !important;
            align-items: flex-start !important;
            margin-bottom: 12px;
            line-height: 1.7;
            text-align: justify;
            padding-left: 0 !important;
            text-indent: 0 !important;
        }

        /* Kolom nomor Romawi (i), (ii), (iii) dibuat statis rata kanan */
        .custom-sub-marker {
            display: inline-block;
            flex-shrink: 0;
            width: 2.5em; 
            text-align: right;
            padding-right: 0.8em;
            box-sizing: border-box;
            font-weight: 500;
        }

        /* Kolom teks di sebelahnya otomatis mulai di titik vertikal yang sama */
        .custom-sub-content {
            flex-grow: 1;
            text-align: justify;
        }

        @media screen and (max-width: 768px) {
            h1 {
                font-size: 1.5rem !important;
                line-height: 1.4 !important;
            }
            body {
                padding-left: 15px;
                padding-right: 15px;
            }
            ol {
                padding-left: 1.75em;
            }
            ol > li::before {
                left: -2.25em;
            }
            .MathJax_Display, .katex-display {
                overflow-x: auto;
                overflow-y: hidden;
                padding-bottom: 10px;
            }
        }
    </style>
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/aaaakshat/cm-web-fonts@latest/fonts.css">
</head>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        document.querySelectorAll("ol ul > li, ol ol > li").forEach(function(li) {
            // Ambil teks HTML mentah di dalam elemen li, abaikan pembungkus <p> jika ada
            let rawContent = li.innerHTML.trim();
            if (li.querySelector("p")) {
                rawContent = li.querySelector("p").innerHTML.trim();
            }

            // Regex untuk mendeteksi pola awal kurung seperti (i), (ii), (a), (1), dll.
            let match = rawContent.match(/^(\s*\([a-zA-Z0-9_iI\s\u00a0.-]+\))\s*/);
            
            if (match) {
                let marker = match[1].trim();
                let content = rawContent.substring(match[0].length);
                
                // Susun ulang struktur HTML murni menjadi 2 span berdampingan
                li.innerHTML = '<span class="custom-sub-marker">' + marker + '</span><span class="custom-sub-content">' + content + '</span>';
            }
        });
    });
</script>

<body>
    <header>
        <h2><a href="/">Calculus Gaming Indonesia</a></h2>
        <hr>
    </header>
    <main>
        {{ content }}
    </main>
</body>
</html>
